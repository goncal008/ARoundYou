<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARoundYou</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>ARoundYou</h1>

  <div style="margin-bottom: 1rem;">
    <button id="start-button">Start</button>
    <button id="switch-mode" style="display: none;">Modo: Mapa</button>
    <button id="toggle-view" style="display: none;">Alternar Vista</button>
    <button id="center-map" style="display: none;">Centrar Mapa</button>
    <button id="view-pois" style="display: none;">Ver POIs</button>
    <button id="camera-button" style="display: none;">Ativar Câmara</button>
  </div>

  <video id="camera-preview" autoplay playsinline style="display: none; width: 100%; max-width: 600px; border-radius: 12px; margin-bottom: 1rem;"></video>

  <div id="map-view" style="display: none; height: 70vh; margin-bottom: 1rem;"></div>

  <div id="poi-list" style="display: none;">
    <h2>Pontos de Interesse</h2>
    <ul id="poi-items"></ul>
  </div>

  <pre id="debug-overlay"></pre>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
